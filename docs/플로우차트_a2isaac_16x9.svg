<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 2560 1440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif">
  <rect width="2560" height="1440" fill="#ffffff"/>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto">
      <path d="M0,0 L0,14 L13,7 z" fill="#444"/>
    </marker>
    <marker id="arrow-loop" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto">
      <path d="M0,0 L0,14 L13,7 z" fill="#9C27B0"/>
    </marker>
    <marker id="arrow-fail" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto">
      <path d="M0,0 L0,14 L13,7 z" fill="#C62828"/>
    </marker>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>

  <rect width="2560" height="1440" fill="#FAFAFA"/>

  <!-- ════════════ TITLE ════════════ -->
  <rect x="0" y="0" width="2560" height="110" fill="url(#title-grad)" opacity="0.95"/>
  <text x="1280" y="48" font-size="36" font-weight="bold" text-anchor="middle" fill="white">
    🚀 화성 광물 수집 자율 탐사 로버 — Mission Flow
  </text>
  <text x="1280" y="76" font-size="17" text-anchor="middle" fill="#FFF59D">
    Procedural Mars Terrain × Multi-rover Autonomy × Coverage Planning × Manipulation
  </text>
  <text x="1280" y="98" font-size="13" text-anchor="middle" fill="#E1F5FE">
    시연 D-day — 멀티 rover 2대 · terrain_00026 · 로버당 광물 2개 채집 · Isaac Sim 5.1 + ROS2 Humble
  </text>

  <!-- ════════════ INPUT BLOCK ════════════ -->
  <g transform="translate(80, 130)">
    <rect width="2400" height="180" fill="#FFE0B2" stroke="#E65100" stroke-width="2" rx="12"/>
    <text x="1200" y="34" font-size="22" font-weight="bold" text-anchor="middle" fill="#BF360C">
      📥 INPUT — 절차생성된 화성 환경 (매 미션 다름)
    </text>

    <g transform="translate(40, 60)">
      <rect width="555" height="110" fill="white" stroke="#E65100" stroke-width="1.5" rx="6"/>
      <text x="277" y="30" font-size="15" font-weight="bold" text-anchor="middle">🗺️ Procedural Terrain (v5)</text>
      <text x="277" y="55" font-size="13" text-anchor="middle" fill="#555">Perlin + crater/hill/ridge + epic obstacles</text>
      <text x="277" y="75" font-size="13" text-anchor="middle" fill="#555">heightmap · obstacle_grid · spawn locations</text>
      <text x="277" y="96" font-size="12" text-anchor="middle" fill="#888">terrain_00026 · passable 88% · slope 5.78°</text>
    </g>

    <g transform="translate(635, 60)">
      <rect width="555" height="110" fill="white" stroke="#E65100" stroke-width="1.5" rx="6"/>
      <text x="277" y="30" font-size="15" font-weight="bold" text-anchor="middle">🌡️ Mars 물리</text>
      <text x="277" y="55" font-size="13" text-anchor="middle" fill="#555">중력 3.72 m/s² (지구 1/3)</text>
      <text x="277" y="75" font-size="13" text-anchor="middle" fill="#555">Regolith 마찰 + 경사 · 6륜 Ackermann 슬립</text>
      <text x="277" y="96" font-size="12" text-anchor="middle" fill="#888">50 m 아레나 경계 충돌벽 4면</text>
    </g>

    <g transform="translate(1230, 60)">
      <rect width="555" height="110" fill="white" stroke="#E65100" stroke-width="1.5" rx="6"/>
      <text x="277" y="30" font-size="15" font-weight="bold" text-anchor="middle">🏠 베이스캠프 (0, 0)</text>
      <text x="277" y="55" font-size="13" text-anchor="middle" fill="#555">RTB 도착 anchor (radius 2 m)</text>
      <text x="277" y="75" font-size="13" text-anchor="middle" fill="#555">mineral/spawn 자동 keepout</text>
      <text x="277" y="96" font-size="12" text-anchor="middle" fill="#888">미션 시작·종료 지점</text>
    </g>

    <g transform="translate(1825, 60)">
      <rect width="555" height="110" fill="white" stroke="#E65100" stroke-width="1.5" rx="6"/>
      <text x="277" y="30" font-size="15" font-weight="bold" text-anchor="middle">💎 광물 (3 클래스)</text>
      <text x="277" y="55" font-size="13" text-anchor="middle" fill="#555">blue_mineral · yellow_mineral · green_gas</text>
      <text x="277" y="75" font-size="13" text-anchor="middle" fill="#555">spawn disc-check 통과 셀에 배치</text>
      <text x="277" y="96" font-size="12" text-anchor="middle" fill="#888">class 별 카운트 (collected_by_class)</text>
    </g>
  </g>

  <!-- Arrow to mission start -->
  <line x1="1280" y1="310" x2="1280" y2="360" stroke="#444" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1310" y="342" font-size="14" fill="#555">멀티 rover 2대 spawn</text>

  <!-- ════════════ MISSION START ════════════ -->
  <g transform="translate(1110, 365)">
    <rect width="340" height="55" fill="#212121" rx="27"/>
    <text x="170" y="36" font-size="20" font-weight="bold" text-anchor="middle" fill="white">🚀 MISSION START · ×2 rovers</text>
  </g>

  <!-- L-bend arrow from Mission Start to Phase 1 top -->
  <path d="M 1280 420 L 1280 442 L 330 442 L 330 460" fill="none" stroke="#444" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ════════════ PHASE 1: EXPLORE ════════════ -->
  <g transform="translate(80, 460)">
    <rect width="500" height="600" fill="#E3F2FD" stroke="#1976D2" stroke-width="3" rx="12"/>
    <rect width="500" height="40" fill="#1976D2" rx="12"/>
    <rect width="500" height="20" y="20" fill="#1976D2"/>
    <text x="20" y="28" font-size="16" font-weight="bold" fill="white">📍 PHASE 1: EXPLORE</text>
    <text x="480" y="28" font-size="11" text-anchor="end" fill="#BBDEFB">FSM: EXPLORE</text>
    <text x="250" y="62" font-size="12" text-anchor="middle" fill="#0D47A1">미지의 화성을 자율 탐사 (coverage sweep)</text>

    <g transform="translate(20, 80)">
      <rect width="460" height="115" fill="white" stroke="#1976D2" stroke-width="1.5" rx="6"/>
      <text x="230" y="26" font-size="14" font-weight="bold" text-anchor="middle">🗺️ Coverage Planner (BCD)</text>
      <text x="230" y="50" font-size="12" text-anchor="middle" fill="#555">3×3 sector + fog reveal (r = 5m)</text>
      <text x="230" y="68" font-size="12" text-anchor="middle" fill="#555">미방문 sector → 다음 anchor</text>
      <text x="230" y="86" font-size="12" text-anchor="middle" fill="#555">cell_size 0.1 m · robot_radius 0.8 m</text>
      <text x="230" y="106" font-size="11" fill="#1976D2" text-anchor="middle">▶ "어디로 갈까"</text>
    </g>

    <g transform="translate(20, 205)">
      <rect width="460" height="115" fill="white" stroke="#1976D2" stroke-width="1.5" rx="6"/>
      <text x="230" y="26" font-size="14" font-weight="bold" text-anchor="middle">🛣️ A* Path Planner</text>
      <text x="230" y="50" font-size="12" text-anchor="middle" fill="#555">obstacle_grid + 동적 다른 rover inflate</text>
      <text x="230" y="68" font-size="12" text-anchor="middle" fill="#555">큰 바위·절벽·epic obstacle 회피</text>
      <text x="230" y="86" font-size="12" text-anchor="middle" fill="#555">simplify_path → waypoint list</text>
      <text x="230" y="106" font-size="11" fill="#1976D2" text-anchor="middle">▶ "어떻게 갈까"</text>
    </g>

    <g transform="translate(20, 330)">
      <rect width="460" height="115" fill="#FFE0B2" stroke="#E65100" stroke-width="2" rx="6"/>
      <text x="230" y="26" font-size="14" font-weight="bold" text-anchor="middle">⚙️ vehicle_v3 Ackermann</text>
      <text x="230" y="50" font-size="12" text-anchor="middle" fill="#555">USD baked ScriptNode (6-wheel)</text>
      <text x="230" y="68" font-size="12" text-anchor="middle" fill="#555">/cmd_vel → 휠 4조향각 + 6구동속도</text>
      <text x="230" y="86" font-size="12" text-anchor="middle" fill="#555">슬립·슬로프 지형 적응 (실차 모델)</text>
      <text x="230" y="106" font-size="11" fill="#BF360C" text-anchor="middle">▶ "실제 핸들 조작"</text>
    </g>

    <g transform="translate(20, 455)">
      <rect width="460" height="115" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5" rx="6"/>
      <text x="230" y="26" font-size="14" font-weight="bold" text-anchor="middle">📷 YOLO Vision Detection</text>
      <text x="230" y="50" font-size="12" text-anchor="middle" fill="#555">/camera/rover/* + /camera/wrist/*</text>
      <text x="230" y="68" font-size="12" text-anchor="middle" fill="#555">YOLO + depth backproject → world XYZ</text>
      <text x="230" y="86" font-size="12" text-anchor="middle" fill="#555">/perception/detections 발행</text>
      <text x="230" y="106" font-size="11" fill="#2E7D32" text-anchor="middle">▶ "광물 발견 시 phase 전환"</text>
    </g>
  </g>

  <!-- Arrow Phase 1 → Phase 2 -->
  <line x1="580" y1="760" x2="620" y2="760" stroke="#444" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="600" y="748" font-size="12" font-weight="bold" text-anchor="middle" fill="#2E7D32">광물 발견!</text>

  <!-- ════════════ PHASE 2: APPROACH ════════════ -->
  <g transform="translate(620, 460)">
    <rect width="500" height="600" fill="#E8F5E9" stroke="#2E7D32" stroke-width="3" rx="12"/>
    <rect width="500" height="40" fill="#2E7D32" rx="12"/>
    <rect width="500" height="20" y="20" fill="#2E7D32"/>
    <text x="20" y="28" font-size="16" font-weight="bold" fill="white">🎯 PHASE 2: APPROACH</text>
    <text x="480" y="28" font-size="11" text-anchor="end" fill="#C8E6C9">FSM: APPROACH</text>
    <text x="250" y="62" font-size="12" text-anchor="middle" fill="#1B5E20">발견한 광물로 정밀 접근</text>

    <g transform="translate(20, 90)">
      <rect width="460" height="150" fill="white" stroke="#2E7D32" stroke-width="1.5" rx="6"/>
      <text x="230" y="28" font-size="14" font-weight="bold" text-anchor="middle">🎯 후보 선정 + 멀티 rover dedup</text>
      <text x="230" y="55" font-size="12" text-anchor="middle" fill="#555">detection confidence ≥ thresh</text>
      <text x="230" y="76" font-size="12" text-anchor="middle" fill="#555">다른 rover 의 /mineral_claims 회피</text>
      <text x="230" y="100" font-size="11" fill="#6A1B9A" text-anchor="middle">→ 가장 가까운 unclaimed mineral 선택</text>
      <text x="230" y="125" font-size="11" fill="#888" text-anchor="middle">▶ "어떤 광물부터?"</text>
    </g>

    <g transform="translate(20, 255)">
      <rect width="460" height="150" fill="white" stroke="#1976D2" stroke-width="1.5" rx="6"/>
      <text x="230" y="28" font-size="14" font-weight="bold" text-anchor="middle">🛣️ A* 재계획 + P-control</text>
      <text x="230" y="55" font-size="12" text-anchor="middle" fill="#555">현재 위치 → mineral world XYZ</text>
      <text x="230" y="76" font-size="12" text-anchor="middle" fill="#555">/supervisor/{path, target} 발행</text>
      <text x="230" y="100" font-size="11" fill="#1976D2" text-anchor="middle">→ yaw + dist P-control align</text>
      <text x="230" y="125" font-size="11" fill="#888" text-anchor="middle">▶ "정밀 접근"</text>
    </g>

    <g transform="translate(20, 420)">
      <rect width="460" height="150" fill="white" stroke="#C62828" stroke-width="1.5" rx="6"/>
      <text x="230" y="28" font-size="14" font-weight="bold" text-anchor="middle">📍 위치 추정 (GT cheat fwd)</text>
      <text x="230" y="55" font-size="12" text-anchor="middle" fill="#555">/ground_truth/odom → /rover/estimated_pose</text>
      <text x="230" y="76" font-size="12" text-anchor="middle" fill="#555">odom_to_estimated_pose 어댑터</text>
      <text x="230" y="100" font-size="11" fill="#C62828" text-anchor="middle">→ 졸업 시 EKF stack (sun_yaw + TRN) swap</text>
      <text x="230" y="125" font-size="11" fill="#888" text-anchor="middle">▶ "GPS 없는 화성에서 어떻게?"</text>
    </g>
  </g>

  <!-- Arrow Phase 2 → Phase 3 -->
  <line x1="1120" y1="760" x2="1160" y2="760" stroke="#444" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1140" y="748" font-size="12" font-weight="bold" text-anchor="middle" fill="#2E7D32">stop_dist 도달</text>

  <!-- ════════════ PHASE 3: PICK & PLACE ════════════ -->
  <g transform="translate(1160, 460)">
    <rect width="500" height="600" fill="#E8F5E9" stroke="#2E7D32" stroke-width="3" rx="12"/>
    <rect width="500" height="40" fill="#2E7D32" rx="12"/>
    <rect width="500" height="20" y="20" fill="#2E7D32"/>
    <text x="20" y="28" font-size="16" font-weight="bold" fill="white">🦾 PHASE 3: PICK_READY</text>
    <text x="480" y="28" font-size="11" text-anchor="end" fill="#C8E6C9">FSM: PICK_READY</text>
    <text x="250" y="62" font-size="12" text-anchor="middle" fill="#1B5E20">광물 채취 및 카고 적재</text>

    <g transform="translate(20, 90)">
      <rect width="460" height="150" fill="white" stroke="#2E7D32" stroke-width="1.5" rx="6"/>
      <text x="230" y="28" font-size="14" font-weight="bold" text-anchor="middle">🦾 M0609 DLS-IK Pipeline</text>
      <text x="230" y="55" font-size="12" text-anchor="middle" fill="#555">HOME → APPROACH → DESCEND</text>
      <text x="230" y="76" font-size="12" text-anchor="middle" fill="#555">→ HOME_MID → CARGO_SWING (joint1 180°)</text>
      <text x="230" y="100" font-size="11" fill="#2E7D32" text-anchor="middle">→ /arm/joint_command (I11)</text>
      <text x="230" y="125" font-size="11" fill="#888" text-anchor="middle">▶ Doosan 6축 + RG2-FT 그리퍼</text>
    </g>

    <g transform="translate(20, 255)">
      <rect width="460" height="150" fill="white" stroke="#2E7D32" stroke-width="1.5" rx="6"/>
      <text x="230" y="28" font-size="14" font-weight="bold" text-anchor="middle">📦 Grasp + 카고 적재</text>
      <text x="230" y="55" font-size="12" text-anchor="middle" fill="#555">/grasp/command pickup → FixedJoint snap</text>
      <text x="230" y="76" font-size="12" text-anchor="middle" fill="#555">settle 2.5s → release → invisible</text>
      <text x="230" y="100" font-size="11" fill="#2E7D32" text-anchor="middle">→ collected_count++ · collected_by_class++</text>
      <text x="230" y="125" font-size="11" fill="#888" text-anchor="middle">▶ post_pick_cooldown 8s</text>
    </g>

    <g transform="translate(20, 420)">
      <rect width="460" height="150" fill="white" stroke="#6A1B9A" stroke-width="1.5" stroke-dasharray="4,4" rx="6"/>
      <text x="230" y="28" font-size="14" font-weight="bold" text-anchor="middle">🔌 ROS2 Event Publish</text>
      <text x="230" y="55" font-size="12" text-anchor="middle" fill="#555">/mission/state (collected_by_class)</text>
      <text x="230" y="76" font-size="12" text-anchor="middle" fill="#555">/mineral_claims (다른 rover 에게 알림)</text>
      <text x="230" y="100" font-size="11" fill="#6A1B9A" text-anchor="middle">→ Web HUD 카운터 + STATUS 갱신</text>
      <text x="230" y="125" font-size="11" fill="#888" text-anchor="middle">▶ ExecuteArmTask action result</text>
    </g>
  </g>

  <!-- Arrow Phase 3 → Decision -->
  <line x1="1660" y1="760" x2="1700" y2="760" stroke="#444" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1680" y="748" font-size="12" font-weight="bold" text-anchor="middle" fill="#2E7D32">채취 완료</text>

  <!-- ════════════ DECISION DIAMOND ════════════ -->
  <g transform="translate(1700, 660)">
    <polygon points="90,0 180,100 90,200 0,100" fill="#FFF9C4" stroke="#F57F17" stroke-width="2"/>
    <text x="90" y="88" font-size="14" font-weight="bold" text-anchor="middle">collected ≥ 2 ?</text>
    <text x="90" y="110" font-size="12" text-anchor="middle">(또는 battery</text>
    <text x="90" y="126" font-size="12" text-anchor="middle">critical)</text>
  </g>

  <!-- YES arrow Decision → Phase 4 -->
  <line x1="1880" y1="760" x2="1940" y2="760" stroke="#444" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1910" y="748" font-size="13" font-weight="bold" text-anchor="middle" fill="#C62828">YES</text>

  <!-- NO loop arrow Decision → back to Phase 1 -->
  <path d="M 1790 860 L 1790 1080 L 330 1080 L 330 1060"
        fill="none" stroke="#9C27B0" stroke-width="3" stroke-dasharray="6,3" marker-end="url(#arrow-loop)"/>
  <text x="1060" y="1072" font-size="13" font-weight="bold" text-anchor="middle" fill="#9C27B0">
    NO → PHASE 1 (다음 mineral 탐사)
  </text>

  <!-- ════════════ PHASE 4: RETURN ════════════ -->
  <g transform="translate(1940, 460)">
    <rect width="500" height="600" fill="#FFEBEE" stroke="#C62828" stroke-width="3" rx="12"/>
    <rect width="500" height="40" fill="#C62828" rx="12"/>
    <rect width="500" height="20" y="20" fill="#C62828"/>
    <text x="20" y="28" font-size="16" font-weight="bold" fill="white">🏠 PHASE 4: RETURN_TO_BASE</text>
    <text x="480" y="28" font-size="11" text-anchor="end" fill="#FFCDD2">FSM: RETURN_TO_BASE</text>
    <text x="250" y="62" font-size="12" text-anchor="middle" fill="#B71C1C">베이스캠프로 자율 복귀</text>

    <g transform="translate(20, 90)">
      <rect width="460" height="150" fill="white" stroke="#C62828" stroke-width="1.5" rx="6"/>
      <text x="230" y="28" font-size="14" font-weight="bold" text-anchor="middle">🎯 Goal = basecamp (0, 0)</text>
      <text x="230" y="55" font-size="12" text-anchor="middle" fill="#555">terrain meta 의 basecamp anchor</text>
      <text x="230" y="76" font-size="12" text-anchor="middle" fill="#555">stale path 폐기 + fresh A* 강제</text>
      <text x="230" y="100" font-size="11" fill="#C62828" text-anchor="middle">→ 새 위치 기준 obstacle 회피 path</text>
      <text x="230" y="125" font-size="11" fill="#888" text-anchor="middle">▶ "임무 완수 후 귀환"</text>
    </g>

    <g transform="translate(20, 255)">
      <rect width="460" height="150" fill="white" stroke="#1976D2" stroke-width="1.5" rx="6"/>
      <text x="230" y="28" font-size="14" font-weight="bold" text-anchor="middle">🛣️ A* + 멀티 rover 회피</text>
      <text x="230" y="55" font-size="12" text-anchor="middle" fill="#555">/rover_positions inflate (r = 1.2 m)</text>
      <text x="230" y="76" font-size="12" text-anchor="middle" fill="#555">A* fail → relaxed start cell 재시도</text>
      <text x="230" y="100" font-size="11" fill="#1976D2" text-anchor="middle">→ 안전망: inflated 셀에서도 탈출</text>
      <text x="230" y="125" font-size="11" fill="#888" text-anchor="middle">▶ "탐사와 동일한 주행 스택 재사용"</text>
    </g>

    <g transform="translate(20, 420)">
      <rect width="460" height="150" fill="white" stroke="#2E7D32" stroke-width="1.5" rx="6"/>
      <text x="230" y="28" font-size="14" font-weight="bold" text-anchor="middle">✅ 도착 판정</text>
      <text x="230" y="55" font-size="12" text-anchor="middle" fill="#555">dist(rover, basecamp) ≤ 2 m</text>
      <text x="230" y="76" font-size="12" text-anchor="middle" fill="#555">cmd_vel = 0 · 자세 유지</text>
      <text x="230" y="100" font-size="11" fill="#2E7D32" text-anchor="middle">→ FSM: MISSION_COMPLETE</text>
      <text x="230" y="125" font-size="11" fill="#888" text-anchor="middle">▶ Web HUD: 녹색 phase 배지</text>
    </g>
  </g>

  <!-- Arrow Phase 4 → Mission Complete -->
  <line x1="2190" y1="1060" x2="2190" y2="1095" stroke="#444" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ════════════ MISSION COMPLETE ════════════ -->
  <g transform="translate(2010, 1100)">
    <rect width="360" height="60" fill="#2E7D32" rx="30"/>
    <text x="180" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="white">✅ MISSION COMPLETE</text>
    <text x="180" y="50" font-size="11" text-anchor="middle" fill="#C8E6C9">rover_1, rover_2 모두 채집 2개 · basecamp 도달</text>
  </g>

