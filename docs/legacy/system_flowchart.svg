<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1400 1620"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L9,5 z" fill="#555"/>
    </marker>
    <marker id="arrow-dash" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L9,5 z" fill="#888"/>
    </marker>
  </defs>

  <rect width="1400" height="1620" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="700" y="48" font-size="28" font-weight="bold" text-anchor="middle" fill="#212121">
    화성 로버 자율주행 시스템
  </text>
  <text x="700" y="76" font-size="14" text-anchor="middle" fill="#666">
    Runtime Control Flow — 런타임 데이터 흐름
  </text>

  <!-- Legend -->
  <g transform="translate(1075, 105)">
    <rect width="295" height="225" fill="white" stroke="#BDBDBD" stroke-width="1" rx="6"/>
    <text x="147" y="22" font-size="13" font-weight="bold" text-anchor="middle">트랙 범례</text>

    <g transform="translate(15, 38)">
      <rect width="20" height="20" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
      <text x="30" y="15" font-size="12">T1 Environment (5060)</text>
    </g>
    <g transform="translate(15, 66)">
      <rect width="20" height="20" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
      <text x="30" y="15" font-size="12">T2 Perception + M0609</text>
    </g>
    <g transform="translate(15, 94)">
      <rect width="20" height="20" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
      <text x="30" y="15" font-size="12">T3 Driving (Mission Brain)</text>
    </g>
    <g transform="translate(15, 122)">
      <rect width="20" height="20" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>
      <text x="30" y="15" font-size="12">T5 Localization + Infra</text>
    </g>
    <g transform="translate(15, 150)">
      <rect width="20" height="20" fill="#1976D2" stroke="#0D47A1" stroke-width="2"/>
      <text x="30" y="15" font-size="12">★ 머신러닝 영역 (PPO)</text>
    </g>
    <g transform="translate(15, 178)">
      <rect width="20" height="20" fill="#E0E0E0" stroke="#424242" stroke-width="1.5"/>
      <text x="30" y="15" font-size="12">Isaac Sim 시뮬레이션</text>
    </g>
  </g>

  <!-- T1 Environment -->
  <g>
    <rect x="60" y="115" width="220" height="100" fill="#FFE0B2" stroke="#E65100" stroke-width="2" rx="8"/>
    <text x="170" y="143" font-size="15" font-weight="bold" text-anchor="middle">🗺️ T1 Environment</text>
    <text x="170" y="165" font-size="12" text-anchor="middle">절차생성 Mars terrain</text>
    <text x="170" y="185" font-size="12" text-anchor="middle">+ Mars Physics Tier 1</text>
    <text x="170" y="205" font-size="11" text-anchor="middle" fill="#666">→ USD + meta.json</text>
  </g>

  <line x1="280" y1="165" x2="430" y2="165" stroke="#888" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dash)"/>
  <text x="355" y="155" font-size="11" text-anchor="middle" fill="#666">load</text>

  <!-- Isaac Sim -->
  <g>
    <rect x="430" y="115" width="380" height="120" fill="#E0E0E0" stroke="#424242" stroke-width="2" rx="8"/>
    <text x="620" y="150" font-size="17" font-weight="bold" text-anchor="middle">🎮 Isaac Sim 환경</text>
    <text x="620" y="175" font-size="13" text-anchor="middle">Mars 지형 + 물리 (PhysX)</text>
    <text x="620" y="200" font-size="11" text-anchor="middle" fill="#555">camera • wheel encoder • IMU • GT pose</text>
    <text x="620" y="218" font-size="11" text-anchor="middle" fill="#666">로봇 (M0609 부착) + 광물 + 베이스캠프</text>
  </g>

  <!-- Sensor arrows -->
  <line x1="510" y1="235" x2="365" y2="320" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="283" font-size="11" fill="#444">📷 camera</text>

  <line x1="730" y1="235" x2="875" y2="320" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="850" y="283" font-size="11" fill="#444">📡 sensors</text>

  <!-- T2 Vision -->
  <g>
    <rect x="195" y="330" width="280" height="100" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2" rx="8"/>
    <text x="335" y="360" font-size="15" font-weight="bold" text-anchor="middle">👁️ T2 Vision</text>
    <text x="335" y="382" font-size="12" text-anchor="middle">색기반 광물 detection</text>
    <text x="335" y="400" font-size="12" text-anchor="middle">(HSV threshold + 가치점수)</text>
    <text x="335" y="420" font-size="11" font-style="italic" text-anchor="middle" fill="#444">머신러닝 X</text>
  </g>

  <!-- T5 Localization -->
  <g>
    <rect x="765" y="330" width="280" height="100" fill="#FFCDD2" stroke="#C62828" stroke-width="2" rx="8"/>
    <text x="905" y="360" font-size="15" font-weight="bold" text-anchor="middle">📍 T5 Localization</text>
    <text x="905" y="382" font-size="12" text-anchor="middle">Mock V-SLAM</text>
    <text x="905" y="400" font-size="12" text-anchor="middle">(GT pose + 노이즈 + 공분산)</text>
    <text x="905" y="420" font-size="11" font-style="italic" text-anchor="middle" fill="#444">머신러닝 X</text>
  </g>

  <!-- T2 → FSM -->
  <line x1="400" y1="430" x2="550" y2="500" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="395" y="470" font-size="11" fill="#444">광물 detection</text>
  <text x="395" y="485" font-size="10" fill="#666">{class, xyz, conf, score}</text>

  <!-- T5 → FSM -->
  <line x1="840" y1="430" x2="690" y2="500" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="855" y="470" font-size="11" fill="#444">estimated_pose</text>
  <text x="855" y="485" font-size="10" fill="#666">+ covariance</text>

  <!-- T3 Mission FSM -->
  <g>
    <rect x="430" y="510" width="380" height="90" fill="#BBDEFB" stroke="#1976D2" stroke-width="2" rx="8"/>
    <text x="620" y="540" font-size="16" font-weight="bold" text-anchor="middle">🚗 T3 Mission FSM</text>
    <text x="620" y="562" font-size="12" text-anchor="middle">"지금 무슨 phase?"</text>
    <text x="620" y="582" font-size="12" text-anchor="middle">EXPLORE / APPROACH / PICK / RETURN</text>
  </g>

  <!-- FSM → M0609 (PICK trigger) -->
  <line x1="810" y1="545" x2="975" y2="545" stroke="#777" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-dash)"/>
  <text x="895" y="536" font-size="11" fill="#666">PICK 요청</text>

  <!-- T2 M0609 -->
  <g>
    <rect x="975" y="510" width="220" height="90" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2" rx="8"/>
    <text x="1085" y="538" font-size="14" font-weight="bold" text-anchor="middle">🦾 T2 M0609</text>
    <text x="1085" y="558" font-size="11" text-anchor="middle">Scripted trajectory</text>
    <text x="1085" y="576" font-size="11" text-anchor="middle">→ 광물 텔레포트</text>
    <text x="1085" y="594" font-size="10" font-style="italic" text-anchor="middle" fill="#444">머신러닝 X</text>
  </g>

  <!-- M0609 → Sim (curved back) -->
  <path d="M 1085 510 Q 1085 370 905 240" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-dash)"/>
  <text x="1100" y="370" font-size="10" fill="#777">텔레포트</text>

  <!-- FSM branches -->
  <line x1="500" y1="600" x2="320" y2="670" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="370" y="640" font-size="11" font-weight="bold" fill="#1976D2">EXPLORE</text>

  <line x1="740" y1="600" x2="920" y2="670" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="850" y="640" font-size="11" font-weight="bold" fill="#1976D2">APPROACH / RETURN</text>

  <!-- Coverage Planner -->
  <g>
    <rect x="170" y="680" width="300" height="90" fill="#BBDEFB" stroke="#1976D2" stroke-width="2" rx="8"/>
    <text x="320" y="710" font-size="14" font-weight="bold" text-anchor="middle">🗺️ T3 Coverage Planner</text>
    <text x="320" y="732" font-size="11" text-anchor="middle">미니맵 grid + 미방문 셀 추적</text>
    <text x="320" y="750" font-size="11" text-anchor="middle">→ next cell (greedy frontier)</text>
  </g>

  <!-- Goal Setter -->
  <g>
    <rect x="770" y="680" width="300" height="90" fill="#BBDEFB" stroke="#1976D2" stroke-width="2" rx="8"/>
    <text x="920" y="710" font-size="14" font-weight="bold" text-anchor="middle">🎯 Goal 결정</text>
    <text x="920" y="732" font-size="11" text-anchor="middle">APPROACH: 광물 좌표 (T2 detection)</text>
    <text x="920" y="750" font-size="11" text-anchor="middle">RETURN: 베이스 좌표 (T1 meta)</text>
  </g>

  <!-- Coverage → A* -->
  <line x1="320" y1="770" x2="550" y2="840" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Goal → A* -->
  <line x1="920" y1="770" x2="690" y2="840" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="620" y="810" font-size="11" text-anchor="middle" fill="#444">goal (x, y)</text>

  <!-- T3 A* Path Planner -->
  <g>
    <rect x="450" y="850" width="340" height="90" fill="#BBDEFB" stroke="#1976D2" stroke-width="2" rx="8"/>
    <text x="620" y="880" font-size="15" font-weight="bold" text-anchor="middle">🛣️ T3 A* Path Planner</text>
    <text x="620" y="902" font-size="11" text-anchor="middle">heightmap + 장애물 grid 기반</text>
    <text x="620" y="920" font-size="11" text-anchor="middle">현재 pose → goal 까지 waypoint list</text>
  </g>

  <!-- A* → PPO -->
  <line x1="620" y1="940" x2="620" y2="990" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="665" y="970" font-size="11" fill="#444">waypoints</text>

  <!-- PPO Wrapper (ML highlighted) -->
  <g>
    <rect x="430" y="1000" width="380" height="120" fill="#1976D2" stroke="#0D47A1" stroke-width="3" rx="8"/>
    <text x="620" y="1032" font-size="16" font-weight="bold" text-anchor="middle" fill="white">🤖 T3 PPO Wrapper</text>
    <text x="620" y="1054" font-size="13" font-weight="bold" text-anchor="middle" fill="#FFF59D">★ 머신러닝 사용 영역 ★</text>
    <text x="620" y="1078" font-size="12" text-anchor="middle" fill="white">클론 best_agent_ppo.pt 재사용</text>
    <text x="620" y="1096" font-size="11" text-anchor="middle" fill="#E3F2FD">waypoint 추종 + height_scan 미세 회피</text>
    <text x="620" y="1112" font-size="11" text-anchor="middle" fill="#E3F2FD">지형 적응 (슬립 / 슬로프 / 작은 돌)</text>
  </g>

  <!-- PPO → Ackermann -->
  <line x1="620" y1="1120" x2="620" y2="1170" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="1150" font-size="11" fill="#444">steer, throttle</text>

  <!-- Ackermann -->
  <g>
    <rect x="480" y="1180" width="280" height="80" fill="#BBDEFB" stroke="#1976D2" stroke-width="2" rx="8"/>
    <text x="620" y="1208" font-size="15" font-weight="bold" text-anchor="middle">⚙️ Ackermann 변환</text>
    <text x="620" y="1230" font-size="12" text-anchor="middle">2D action → 6륜 명령</text>
    <text x="620" y="1248" font-size="11" font-style="italic" text-anchor="middle" fill="#444">기하학 수식 (학습 X)</text>
  </g>

  <!-- Ackermann → Isaac Sim (loopback around left) -->
  <path d="M 480 1220 L 35 1220 L 35 165 L 430 165" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="20" y="700" font-size="12" fill="#444" transform="rotate(-90, 20, 700)">joint commands → 다음 step</text>

  <!-- T4 footer -->
  <g transform="translate(60, 1310)">
    <rect width="1240" height="170" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2" stroke-dasharray="8,4" rx="8"/>
    <text x="620" y="32" font-size="16" font-weight="bold" text-anchor="middle" fill="#4A148C">🔌 T4 Integration + PM (사용자) — 별도 레이어</text>
    <text x="620" y="58" font-size="12" text-anchor="middle">위 모든 노드는 ROS2 토픽으로 publish → T4가 subscribe → Mission Control UI 렌더</text>
    <line x1="40" y1="74" x2="1200" y2="74" stroke="#9C27B0" stroke-dasharray="3,3"/>
    <g transform="translate(40, 92)">
      <text font-size="11" font-weight="bold" fill="#444">📺 Mission Control UI:</text>
      <text x="0" y="22" font-size="11" fill="#555">  • 미니맵 시각화 (T3 데이터)    • 위치+공분산 타원 (T5 데이터)    • 광물 마커 (T2 데이터)    • 카고/phase 진행률 (T3 데이터)</text>
      <text x="0" y="42" font-size="11" fill="#555">  • 카메라 view (1인칭/3인칭)    • 데모 시나리오 orchestration     • 발표 자료 + 백업 영상     • PM 역할 (인터페이스 / 게이트 / 통합)</text>
      <text x="0" y="68" font-size="10" font-style="italic" fill="#777">※ UI는 control flow의 downstream consumer이므로 이 다이어그램에서 분리 표기. overlay하면 가독성 ↓</text>
    </g>
  </g>

  <!-- T5 footer note -->
  <text x="700" y="1505" font-size="11" text-anchor="middle" fill="#888">📍 T5는 위 Localization 외에 ROS2 launch/토픽 schema + Eval pipeline + Mars Physics Tier 2 동시 담당 (인프라 backbone)</text>

</svg>
